services:
# web_server の立ち上げ
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    container_name: web_server

  database:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: budget_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes: # postgresのデータを/var/lib/postgresql/dataにマウントし永続化
      - postgres_data:/var/lib/postgresql/data
      - ./database/sql:/docker-entrypoint-initdb.d
    container_name: database

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: ["sh", "-c", "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 3000"]
    environment:
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: budget_db
      JWT_SECRET: change_me
      CORS_ORIGIN: http://localhost:8080
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    depends_on:
      - database
    container_name: backend

# サービスで使用する volume を定義
volumes:
  postgres_data:
    driver: local