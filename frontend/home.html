<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>家計簿アプリ</title>
  </head>
  <body>
    <div class="header">
      <h1>🏦 家計簿アプリ</h1>
      <button id="logoutBtn">ログアウト</button>
    </div>
    <script src="js/main.js"></script>
    <script>
      // ログアウト処理
      document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.removeItem('access_token');
        // ログイン画面へ戻る
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
